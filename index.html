<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solis BLE Full Dashboard</title>
    <!-- Import Google Font Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(22, 28, 45, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --green: #10b981;
            --red: #ef4444;
            --purple: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            padding: 24px 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 12px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: rgba(10, 15, 30, 0.8);
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            margin-bottom: 14px;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-connect {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
        }

        .btn-connect.connected {
            background: linear-gradient(135deg, #059669, #047857);
            box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
        }

        .btn-save {
            background: linear-gradient(135deg, #e11d48, #be123c);
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);
        }

        .btn-on {
            background: var(--green);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
            flex: 1;
        }

        .btn-off {
            background: var(--red);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
            flex: 1;
        }

        .btn-sync {
            background: var(--purple);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.2);
        }

        .flex-row {
            display: flex;
            gap: 12px;
        }

        .status-text {
            text-align: center;
            color: var(--accent);
            font-weight: 600;
            font-size: 13px;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .value-display {
            text-align: center;
            margin-top: 14px;
            padding: 10px;
            background: rgba(10, 15, 30, 0.5);
            border-radius: 8px;
            font-size: 14px;
        }

        #cur_val {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin-left: 6px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 5px;
        }

        .badge-ok {
            background: rgba(16, 185, 129, 0.2);
            color: var(--green);
        }

        .badge-fail {
            background: rgba(239, 68, 68, 0.2);
            color: var(--red);
        }

        #timeSyncStatus {
            font-size: 12px;
            text-align: center;
            margin-top: 6px;
            min-height: 18px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <div>
            <h1>⚙️ Solis BLE Dashboard</h1>
            <div class="subtitle">Điều khiển và cấu hình qua Bluetooth Low Energy</div>
        </div>

        <button id="connectBtn" class="btn btn-connect" onclick="connectBLE()">🔗 Kết nối Bluetooth</button>
        <div id="status" class="status-text">Chưa kết nối Bluetooth</div>

        <div class="card">
            <div class="card-title">🕹️ Điều khiển nhanh</div>
            <div class="flex-row">
                <button class="btn btn-on" onclick="sendRawCmd('on')">BẬT (ON)</button>
                <button class="btn btn-off" onclick="sendRawCmd('off')">TẮT (OFF)</button>
            </div>
            <div class="value-display">
                Giá trị hiện tại: <span id="cur_val">--</span>
                <br>
                <span id="modbusStatus" class="status-badge badge-fail" style="display:none;">MẤT KẾT NỐI</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">🕒 Thời gian thiết bị</div>
            <button class="btn btn-sync" onclick="syncTimeBLE()">🕒 Đồng bộ thời gian</button>
            <div id="timeSyncStatus"></div>
        </div>

        <div class="card">
            <div class="card-title">🔧 Cấu hình hệ thống Modbus</div>

            <label>Slave ID</label>
            <input type="number" id="slave_id" min="1" max="247">

            <label>Register Address (Write)</label>
            <input type="number" id="reg_addr">

            <label>HealthCheck Reg (Read)</label>
            <input type="number" id="health_reg">

            <label>Value 1 (ON)</label>
            <input type="number" id="value_on">

            <label>Value 2 (OFF)</label>
            <input type="number" id="value_off">

            <button class="btn btn-save" onclick="saveConfigBLE()">💾 Lưu cấu hình qua Bluetooth</button>
        </div>
    </div>

    <script>
        const NUS_SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const RX_CHARACTERISTIC_UUID = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
        const TX_CHARACTERISTIC_UUID = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

        let bleDevice = null;
        let rxCharacteristic = null;

        async function connectBLE() {
            try {
                document.getElementById('status').innerText = "Đang quét tìm thiết bị...";
                bleDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'Solis-EPM-Bluetooth' }],
                    optionalServices: [NUS_SERVICE_UUID]
                });

                document.getElementById('status').innerText = "Đang kết nối cổng GATT...";
                const server = await bleDevice.gatt.connect();
                const service = await server.getPrimaryService(NUS_SERVICE_UUID);

                rxCharacteristic = await service.getCharacteristic(RX_CHARACTERISTIC_UUID);
                const txCharacteristic = await service.getCharacteristic(TX_CHARACTERISTIC_UUID);

                await txCharacteristic.startNotifications();
                txCharacteristic.addEventListener('characteristicvaluechanged', handleIncomingData);

                const connBtn = document.getElementById('connectBtn');
                connBtn.innerText = "✅ Thiết bị đã kết nối";
                connBtn.className = "btn btn-connect connected";
                document.getElementById('status').innerText = "Kết nối BLE thành công!";

                // --- TỰ ĐỘNG ĐỒNG BỘ THỜI GIAN KHI KẾT NỐI ---
                setTimeout(async () => {
                    try {
                        let epochVal = Math.floor(Date.now() / 1000);
                        let timePayload = {
                            type: "time",
                            epoch: epochVal
                        };
                        let enc = new TextEncoder();
                        await rxCharacteristic.writeValue(enc.encode(JSON.stringify(timePayload)));
                        document.getElementById('timeSyncStatus').innerText = "✓ Đã tự động đồng bộ thời gian!";
                        document.getElementById('timeSyncStatus').style.color = "var(--green)";
                        setTimeout(() => {
                            document.getElementById('timeSyncStatus').innerText = "";
                        }, 3000);
                    } catch (e) {
                        console.error("Tự động đồng bộ thời gian thất bại:", e);
                    }
                }, 1000);
            } catch (error) {
                document.getElementById('status').innerText = "Lỗi kết nối!";
                console.error(error);
            }
        }

        // Xử lý dữ liệu ESP32 đổ lên -> Đổ dữ liệu vào các ô Input
        function handleIncomingData(event) {
            let enc = new TextDecoder("utf-8");
            let rawStr = enc.decode(event.target.value);
            console.log("Nhận từ ESP32:", rawStr);

            try {
                let data = JSON.parse(rawStr);
                if (data.type === "sync") {
                    // Điền tự động vào form cấu hình
                    document.getElementById('slave_id').value = data.slave_id;
                    document.getElementById('reg_addr').value = data.reg_addr;
                    document.getElementById('health_reg').value = data.health_reg;
                    document.getElementById('value_on').value = data.value_on;
                    document.getElementById('value_off').value = data.value_off;

                    // Cập nhật trạng thái trị vận hành
                    document.getElementById('cur_val').innerText = data.cur_val;
                    
                    const modbusStatus = document.getElementById('modbusStatus');
                    modbusStatus.style.display = "inline-block";
                    if (data.connected) {
                        modbusStatus.innerText = "MODBUS OK";
                        modbusStatus.className = "status-badge badge-ok";
                    } else {
                        modbusStatus.innerText = "MẤT KẾT NỐI MODBUS";
                        modbusStatus.className = "status-badge badge-fail";
                    }
                }
            } catch (e) {
                console.log("Dữ liệu nhận được không phải JSON cấu hình:", rawStr);
            }
        }

        // Hàm gửi lệnh Text điều khiển nhanh (on/off)
        async function sendRawCmd(text) {
            if (!rxCharacteristic) return alert("Chưa kết nối Bluetooth!");
            let enc = new TextEncoder();
            await rxCharacteristic.writeValue(enc.encode(text));
        }

        // Hàm thủ công đồng bộ thời gian qua BLE
        async function syncTimeBLE() {
            if (!rxCharacteristic) return alert("Chưa kết nối Bluetooth!");
            try {
                const statusDiv = document.getElementById('timeSyncStatus');
                statusDiv.innerText = "Đang đồng bộ...";
                statusDiv.style.color = "var(--text-main)";
                
                let epochVal = Math.floor(Date.now() / 1000);
                let timePayload = {
                    type: "time",
                    epoch: epochVal
                };
                let enc = new TextEncoder();
                await rxCharacteristic.writeValue(enc.encode(JSON.stringify(timePayload)));
                
                statusDiv.innerText = "✓ Đồng bộ thời gian thành công!";
                statusDiv.style.color = "var(--green)";
                setTimeout(() => {
                    statusDiv.innerText = "";
                }, 3000);
            } catch (error) {
                document.getElementById('timeSyncStatus').innerText = "✗ Đồng bộ thất bại!";
                document.getElementById('timeSyncStatus').style.color = "var(--red)";
                console.error(error);
            }
        }

        // Hàm thu thập form và đóng gói JSON gửi ngược lại ESP32 để lưu
        async function saveConfigBLE() {
            if (!rxCharacteristic) return alert("Chưa kết nối Bluetooth!");

            let configPayload = {
                type: "save",
                slave_id: parseInt(document.getElementById('slave_id').value),
                reg_addr: parseInt(document.getElementById('reg_addr').value),
                health_reg: parseInt(document.getElementById('health_reg').value),
                value_on: parseInt(document.getElementById('value_on').value),
                value_off: parseInt(document.getElementById('value_off').value)
            };

            let jsonString = JSON.stringify(configPayload);
            console.log("Gửi cấu hình mới:", jsonString);

            let enc = new TextEncoder();
            document.getElementById('status').innerText = "Đang gửi cấu hình mới...";
            await rxCharacteristic.writeValue(enc.encode(jsonString));
            document.getElementById('status').innerText = "Đã gửi cấu hình thành công!";
        }
    </script>
</body>

</html>
